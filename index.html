<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>量化策略大厅</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0c111b; color: #cfd9e6; padding: 20px;
        }
        .card {
            background: #1a1f2c; border-radius: 24px; padding: 24px; margin-bottom: 20px;
            border: 1px solid #2d3440; cursor: pointer; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-4px); border-color: #3b82f6; }
        .card-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #e5e9f0; }
        .card-desc { color: #8a94a8; font-size: 14px; margin-bottom: 16px; }
        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 12px;
            background: #2f3e5a; color: #b0d0ff;
        }
        h1 { margin-bottom: 24px; }
    </style>
</head>
<body>
    <h1>📊 量化策略大厅</h1>
    <div class="card" onclick="location.href='kline-king.html'">
        <div class="card-title">⚡ K线之王</div>
        <div class="card-desc">基于K线阴阳反转，持有一根K线后平仓，严格的反转等待逻辑。支持全仓/逐仓、自定义周期杠杆。</div>
        <span class="badge">15+周期可选</span>
    </div>
    <div class="card" onclick="location.href='wick-any.html'">
        <div class="card-title">📈 全市场·最长上影线做空</div>
        <div class="card-desc">可配置K线周期（15分钟～1天），每个周期收盘前全市场扫描，选出上影线最长合约做空，持仓一个周期。</div>
        <span class="badge">周期可选·全市场</span>
    </div>
</body>
</html>
