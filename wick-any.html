<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>全市场·最长上影线做空</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0c111b; color: #cfd9e6; padding: 12px;
        }
        .card {
            background: #1a1f2c; border-radius: 20px; padding: 16px; margin-bottom: 16px;
            border: 1px solid #2d3440;
        }
        .title { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #e5e9f0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 11px; color: #8a94a8; display: block; margin-bottom: 2px; }
        input, select {
            width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #2d3440;
            background: #0f1420; color: #e5e9f0; font-size: 14px;
        }
        button {
            background: #2f6ed6; border: none; color: white; padding: 12px; border-radius: 30px;
            font-weight: 600; cursor: pointer; width: 100%;
        }
        button.small { padding: 6px 12px; width: auto; }
        button.green { background: #27a64b; }
        button.red { background: #d64f4f; }
        .badge {
            padding: 4px 10px; border-radius: 30px; font-size: 12px; background: #2d3440; color: #b0c0e0;
        }
        .badge.active { background: #1a4f2e; color: #8ce99a; }
        .badge.long { background: #1a4f2e; color: #8ce99a; }
        .badge.short { background: #6b2e2e; color: #f7a8a8; }
        .strategy-card {
            background: #1a1f2c; border-radius: 24px; padding: 16px; margin-bottom: 20px;
            border: 1px solid #2d3440;
        }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .price-row {
            display: flex; gap: 16px; flex-wrap: wrap; background: #0f1420; padding: 12px; border-radius: 16px;
        }
        .price-item { flex: 1; min-width: 80px; }
        .price-label { font-size: 11px; color: #8a94a8; }
        .price-value { font-size: 14px; font-weight: 600; color: white; }
        .trade-list {
            list-style: none; max-height: 200px; overflow-y: auto; margin-top: 8px;
            background: #0f1420; border-radius: 12px; padding: 8px;
        }
        .trade-item {
            display: flex; justify-content: space-between; padding: 6px 0;
            border-bottom: 1px solid #2d3440; font-size: 12px;
        }
        .chart-container { height: 200px; margin: 12px 0; border-radius: 16px; overflow: hidden; }
        .positive { color: #8ce99a; }
        .negative { color: #f7a8a8; }
        .back-link {
            display: inline-block; margin-bottom: 16px; color: #8a94a8; text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← 返回首页</a>
    <h2 style="margin-bottom: 16px;">📈 全市场最长上影线做空 (周期可选)</h2>

    <div class="card">
        <div class="title">账户总览</div>
        <div class="grid-2">
            <div><div class="price-label">总权益 (USDT)</div><div class="price-value" id="totalEquity">0.00</div></div>
            <div><div class="price-label">总收益率</div><div class="price-value" id="totalReturn">0.00%</div></div>
        </div>
    </div>

    <div class="card">
        <div class="title">➕ 创建新策略</div>
        <div class="grid-2">
            <div><label>策略名称</label><input type="text" id="newName" placeholder="可选"></div>
            <div>
                <label>K线周期</label>
                <select id="newInterval">
                    <option value="15m">15分钟</option>
                    <option value="30m">30分钟</option>
                    <option value="1h">1小时</option>
                    <option value="4h">4小时</option>
                    <option value="1d">1天 (23:59)</option>
                </select>
            </div>
            <div><label>杠杆</label><input type="number" id="newLeverage" min="1" max="100" value="10" step="1"></div>
            <div><label>金额 (USDT)</label><input type="number" id="newAmount" min="1" value="100" step="1"></div>
            <div>
                <label>模式</label>
                <div style="display: flex; gap: 16px;">
                    <label><input type="radio" name="newMarginMode" value="cross" checked> 全仓</label>
                    <label><input type="radio" name="newMarginMode" value="isolated"> 逐仓</label>
                </div>
            </div>
        </div>
        <button id="createBtn" style="margin-top:12px;">创建策略</button>
    </div>

    <div id="strategy-list"></div>

    <script>
        const API_BASE = 'https://ooxoo-production.up.railway.app'; // ⚠️ 替换为您的实际域名
        const USER_ID = 'demo_user';
        const STRATEGY_TYPE = 'wick_any';

        document.getElementById('createBtn').addEventListener('click', async () => {
            const name = document.getElementById('newName').value.trim() || undefined;
            const interval = document.getElementById('newInterval').value;
            const leverage = parseInt(document.getElementById('newLeverage').value);
            const amountUsdt = parseFloat(document.getElementById('newAmount').value);
            const marginMode = document.querySelector('input[name="newMarginMode"]:checked').value;

            const res = await fetch(`${API_BASE}/strategy?user=${USER_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name, 
                    type: STRATEGY_TYPE,
                    interval,
                    leverage, 
                    amountUsdt, 
                    marginMode 
                })
            });
            if (res.ok) {
                document.getElementById('newName').value = '';
                loadStrategies();
            } else {
                const err = await res.text();
                alert('创建失败: ' + err);
            }
        });

        async function loadStrategies() {
            try {
                const res = await fetch(`${API_BASE}/strategies?user=${USER_ID}`);
                const strategies = await res.json();
                const filtered = strategies.filter(s => s.type === STRATEGY_TYPE);
                renderStrategies(filtered);
                updateTotal(filtered);
            } catch (err) {
                document.getElementById('strategy-list').innerHTML = '<div class="card">加载失败</div>';
            }
        }

        function updateTotal(strategies) {
            const totalEquity = strategies.reduce((sum, s) => sum + (s.equity || 10000), 0);
            const totalCapital = strategies.length * 10000;
            const totalReturn = ((totalEquity - totalCapital) / totalCapital * 100).toFixed(2);
            document.getElementById('totalEquity').innerText = totalEquity.toFixed(2);
            document.getElementById('totalReturn').innerText = (totalReturn > 0 ? '+' : '') + totalReturn + '%';
        }

        function renderStrategies(strategies) {
            const container = document.getElementById('strategy-list');
            if (!strategies.length) {
                container.innerHTML = '<div class="card">暂无策略，点击上方创建</div>';
                return;
            }
            container.innerHTML = '';
            strategies.forEach(s => {
                const pos = s.position;
                const card = document.createElement('div');
                card.className = 'strategy-card';
                card.dataset.id = s.id;

                const statusMap = { idle: '空闲', in_short: '持仓空' };
                const statusText = s.status === 'in_short' ? '持仓空' : '空闲';

                let headerHtml = `
                    <div class="row">
                        <div>
                            <span style="font-weight:600;">${s.name || s.id.slice(0,8)}</span>
                            <span class="badge">全市场·${s.interval}</span>
                            <span class="badge ${s.active ? 'active' : ''}">${s.active ? '运行' : '停止'}</span>
                            <span class="badge" style="background:#3b4256;">${statusText}</span>
                        </div>
                        <span class="badge ${pos ? (pos.side === 'long' ? 'long' : 'short') : ''}">${pos ? (pos.side === 'long' ? '多' : '空') : '无持仓'}</span>
                    </div>
                `;

                const strategyReturn = ((s.equity - 10000) / 10000 * 100).toFixed(2);
                const totalFundsHtml = `
                    <div class="price-row" style="margin:8px 0;">
                        <div class="price-item"><span class="price-label">资金总额</span><span class="price-value">${s.equity.toFixed(2)} USDT</span></div>
                        <div class="price-item"><span class="price-label">策略收益率</span><span class="price-value ${strategyReturn >= 0 ? 'positive' : 'negative'}">${strategyReturn}%</span></div>
                    </div>
                `;

                let positionHtml = `
                    <div class="price-row" style="margin:8px 0;">
                        <div class="price-item"><span class="price-label">收益额</span><span class="price-value">${pos ? (pos.unrealizedPnl || 0).toFixed(2) : '0.00'}</span></div>
                        <div class="price-item"><span class="price-label">收益率</span><span class="price-value">${pos ? ((pos.unrealizedPnl / (pos.size * pos.entryPrice / pos.leverage) * 100) || 0).toFixed(2) : '0.00'}%</span></div>
                        <div class="price-item"><span class="price-label">持仓量</span><span class="price-value">${pos ? (pos.size * pos.entryPrice).toFixed(2) : '0.00'}</span></div>
                        <div class="price-item"><span class="price-label">保证金</span><span class="price-value">${pos ? (pos.margin || 0).toFixed(2) : '0.00'}</span></div>
                        <div class="price-item"><span class="price-label">杠杆</span><span class="price-value">${pos ? pos.leverage : s.leverage}x</span></div>
                    </div>
                    <div class="price-row">
                        <div class="price-item"><span class="price-label">开仓合约</span><span class="price-value">${pos ? pos.symbol : '—'}</span></div>
                        <div class="price-item"><span class="price-label">开仓均价</span><span class="price-value">${pos ? pos.entryPrice.toFixed(2) : '0.00'}</span></div>
                        <div class="price-item"><span class="price-label">标记价格</span><span class="price-value">${(s.markPrice || 0).toFixed(2)}</span></div>
                    </div>
                `;

                const buttonsHtml = `
                    <div class="row" style="margin-top:12px; gap:8px;">
                        <button class="small ${s.active ? 'red' : 'green'}" onclick="toggleStrategy('${s.id}', ${!s.active})" style="flex:1;">${s.active ? '停止' : '启动'}</button>
                        ${pos ? `<button class="small red" onclick="closePosition('${s.id}')" style="flex:1;">市价全平</button>` : ''}
                        <button class="small red" onclick="deleteStrategy('${s.id}')" style="flex:1;">删除</button>
                    </div>
                `;

                let tradesHtml = '<div class="price-label" style="margin:8px 0 4px;">所有交易记录</div><ul class="trade-list">';
                if (s.history && s.history.length) {
                    s.history.slice().reverse().forEach(t => {
                        const timeStr = new Date(t.time * 1000).toLocaleString('zh-CN', { hour12: false });
                        const sign = t.pnl >= 0 ? '+' : '';
                        const symbolText = t.symbol ? t.symbol.slice(0,10) : '';
                        tradesHtml += `<li class="trade-item"><span>${timeStr} ${t.type==='open'?'开':'平'} ${t.side==='long'?'多':'空'} ${symbolText} ${t.size.toFixed(4)} @ ${t.price.toFixed(2)}</span><span class="${t.pnl>=0?'positive':'negative'}">${sign}${(t.pnl||0).toFixed(2)}</span></li>`;
                    });
                } else {
                    tradesHtml += '<li class="trade-item" style="justify-content:center;">暂无交易</li>';
                }
                tradesHtml += '</ul>';

                card.innerHTML = headerHtml + totalFundsHtml + positionHtml + buttonsHtml + tradesHtml;
                container.appendChild(card);
            });
        }

        window.toggleStrategy = async (id, active) => {
            await fetch(`${API_BASE}/strategy/${id}/control?user=${USER_ID}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ active })
            });
            loadStrategies();
        };

        window.closePosition = async (id) => {
            if (!confirm('确认市价全平当前仓位？')) return;
            const res = await fetch(`${API_BASE}/strategy/${id}/close?user=${USER_ID}`, { method: 'POST' });
            if (res.ok) { alert('平仓成功'); loadStrategies(); } else alert('平仓失败');
        };

        window.deleteStrategy = async (id) => {
            if (!confirm('确认删除该策略？')) return;
            const res = await fetch(`${API_BASE}/strategy/${id}?user=${USER_ID}`, { method: 'DELETE' });
            if (res.ok) { alert('策略已删除'); loadStrategies(); } else alert('删除失败');
        };

        loadStrategies();
        setInterval(loadStrategies, 30000);
    </script>
</body>
</html>
