<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>K线之王 · 增强版</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0e1a;
            color: #e0e5f0;
            padding: 16px 12px;
        }
        .card {
            background: #151e2c;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #2a3444;
        }
        .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f0f3fa;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        label {
            font-size: 11px;
            color: #8e9ab0;
            display: block;
            margin-bottom: 4px;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #2a3444;
            background: #0f1420;
            color: #e0e5f0;
            font-size: 14px;
        }
        button {
            background: #2f6ed6;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button.small {
            padding: 6px 12px;
            width: auto;
        }
        button.green { background: #27a64b; }
        button.red { background: #d64f4f; }
        .option-group {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: nowrap;
            white-space: nowrap;
        }
        .option-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            cursor: pointer;
            margin: 0;
            white-space: nowrap;
        }
        .row-section {
            margin-bottom: 16px;
        }
        .row-section:last-of-type {
            margin-bottom: 0;
        }
        .strategy-card {
            background: #151e2c;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #2a3444;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            background: #2a3444;
            color: #b0c4e0;
            white-space: nowrap;
        }
        .badge.active { background: #1a4f2e; color: #8ce99a; }
        .badge.long { background: #1a4f2e; color: #8ce99a; }
        .badge.short { background: #6b2e2e; color: #f7a8a8; }
        .position-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            background: #0f1420;
            padding: 12px;
            border-radius: 16px;
            margin: 12px 0;
        }
        .pos-item {
            text-align: left;
        }
        .pos-label {
            font-size: 11px;
            color: #8e9ab0;
            margin-bottom: 4px;
        }
        .pos-value {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }
        .price-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #0f1420;
            padding: 12px;
            border-radius: 16px;
            margin: 12px 0;
        }
        .status-message {
            text-align: center;
            color: #8e9ab0;
            padding: 16px;
            background: #0f1420;
            border-radius: 16px;
            margin: 12px 0;
        }
        .trade-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 8px;
            background: #0f1420;
            border-radius: 12px;
            padding: 8px;
        }
        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a3444;
            font-size: 12px;
        }
        .chart-container {
            height: 200px;
            margin: 12px 0;
            border-radius: 16px;
            overflow: hidden;
            background: #000000;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .copy-btn {
            background: #2f6ed6;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            color: white;
            margin-top: 8px;
        }
        .positive { color: #8ce99a; }
        .negative { color: #f7a8a8; }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #8e9ab0;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .position-grid { grid-template-columns: repeat(3, 1fr); }
            .price-grid { grid-template-columns: 1fr; gap: 8px; }
        }
        @media (max-width: 480px) {
            .option-group { gap: 16px; }
            .option-group label { font-size: 13px; }
        }
        @media (max-width: 360px) {
            .option-group { gap: 12px; }
            .option-group label { font-size: 12px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← 返回首页</a>
    <div style="margin-bottom: 16px; font-size: 16px; font-weight: 600;">K线之王</div>

    <div class="card">
        <div class="title">📊 账户总览</div>
        <div class="grid-2">
            <div><div class="pos-label">总权益 (USDT)</div><div class="pos-value" id="totalEquity">0.00</div></div>
            <div><div class="pos-label">总收益率</div><div class="pos-value" id="totalReturn">0.00%</div></div>
        </div>
    </div>

    <div class="card">
        <div class="title">➕ 创建新策略</div>
        <div class="grid-2">
            <div>
                <label>策略名称</label>
                <input type="text" id="newName" placeholder="可选">
            </div>
            <div>
                <label>交易对</label>
                <select id="newSymbolSelect" style="margin-bottom: 8px;">
                    <option value="BTC-USDT-SWAP">BTC/USDT 永续</option>
                    <option value="ETH-USDT-SWAP">ETH/USDT 永续</option>
                    <option value="SOL-USDT-SWAP">SOL/USDT 永续</option>
                    <option value="BNB-USDT-SWAP">BNB/USDT 永续</option>
                    <option value="XRP-USDT-SWAP">XRP/USDT 永续</option>
                    <option value="DOGE-USDT-SWAP">DOGE/USDT 永续</option>
                    <option value="custom">其他 (手动输入)</option>
                </select>
                <div id="customSymbolContainer" style="display: none;"><input type="text" id="customSymbol" placeholder="如 LINK-USDT-SWAP"></div>
                <input type="hidden" id="newSymbol" value="BTC-USDT-SWAP">
            </div>
            <div>
                <label>K线周期</label>
                <select id="newInterval">
                    <option value="15m">15分钟</option>
                    <option value="30m" selected>30分钟</option>
                    <option value="1h">1小时</option>
                    <option value="2h">2小时</option>
                    <option value="4h">4小时</option>
                    <option value="6h">6小时</option>
                    <option value="12h">12小时</option>
                </select>
            </div>
            <div>
                <label>杠杆</label>
                <input type="number" id="newLeverage" min="1" max="100" value="10" step="1">
            </div>
        </div>

        <div class="row-section">
            <label>金额 (USDT)</label>
            <input type="number" id="newAmount" min="1" value="100" step="1">
        </div>

        <div class="row-section">
            <label>方向</label>
            <div class="option-group">
                <label><input type="radio" name="newDirection" value="long"> 多</label>
                <label><input type="radio" name="newDirection" value="short"> 空</label>
                <label><input type="radio" name="newDirection" value="both" checked> 双向</label>
            </div>
        </div>

        <div class="row-section">
            <label>缩量</label>
            <div class="option-group">
                <label><input type="radio" name="newShrink" value="true"> 是</label>
                <label><input type="radio" name="newShrink" value="false" checked> 否</label>
            </div>
        </div>

        <div class="row-section">
            <label>仓位模式</label>
            <div class="option-group">
                <label><input type="radio" name="newMarginMode" value="cross" checked> 全仓</label>
                <label><input type="radio" name="newMarginMode" value="isolated"> 逐仓</label>
            </div>
        </div>

        <button id="createBtn" style="margin-top: 8px;">创建策略</button>
    </div>

    <div id="strategy-list"></div>

    <script>
        const API_BASE = 'https://ooxoo-production.up.railway.app'; // ⚠️ 请确认是否为您的实际域名
        const USER_ID = 'demo_user';
        const STRATEGY_TYPE = 'kline_king';

        // 交易对切换
        const symbolSelect = document.getElementById('newSymbolSelect');
        const customSymbolContainer = document.getElementById('customSymbolContainer');
        const customSymbolInput = document.getElementById('customSymbol');
        const symbolHidden = document.getElementById('newSymbol');
        function updateSymbol() {
            if (symbolSelect.value === 'custom') {
                customSymbolContainer.style.display = 'block';
                symbolHidden.value = customSymbolInput.value || 'CUSTOM-USDT-SWAP';
            } else {
                customSymbolContainer.style.display = 'none';
                symbolHidden.value = symbolSelect.value;
            }
        }
        symbolSelect.addEventListener('change', updateSymbol);
        customSymbolInput.addEventListener('input', () => {
            if (symbolSelect.value === 'custom') symbolHidden.value = customSymbolInput.value || 'CUSTOM-USDT-SWAP';
        });
        updateSymbol();

        document.getElementById('createBtn').addEventListener('click', async () => {
            const name = document.getElementById('newName').value.trim() || undefined;
            const symbol = document.getElementById('newSymbol').value.trim();
            if (!symbol) return alert('请输入交易对');
            const interval = document.getElementById('newInterval').value;
            const leverage = parseInt(document.getElementById('newLeverage').value);
            const amountUsdt = parseFloat(document.getElementById('newAmount').value);
            const marginMode = document.querySelector('input[name="newMarginMode"]:checked').value;
            const direction = document.querySelector('input[name="newDirection"]:checked').value;
            const shrink = document.querySelector('input[name="newShrink"]:checked').value === 'true';

            const res = await fetch(`${API_BASE}/strategy?user=${USER_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name, 
                    type: STRATEGY_TYPE,
                    symbol, 
                    interval, 
                    leverage, 
                    amountUsdt, 
                    marginMode,
                    direction,
                    shrink
                })
            });
            if (res.ok) {
                document.getElementById('newName').value = '';
                symbolSelect.value = 'BTC-USDT-SWAP';
                updateSymbol();
                loadStrategies();
            } else {
                const err = await res.text();
                alert('创建失败: ' + err);
            }
        });

        async function loadStrategies() {
            try {
                const res = await fetch(`${API_BASE}/strategies?user=${USER_ID}`);
                const strategies = await res.json();
                const filtered = strategies.filter(s => s.type === STRATEGY_TYPE);
                renderStrategies(filtered);
                updateTotal(filtered);
            } catch (err) {
                console.error(err);
                document.getElementById('strategy-list').innerHTML = '<div class="card">加载失败</div>';
            }
        }

        function updateTotal(strategies) {
            const totalEquity = strategies.reduce((sum, s) => sum + (s.equity || 10000), 0);
            const totalCapital = strategies.length * 10000;
            const totalReturn = ((totalEquity - totalCapital) / totalCapital * 100).toFixed(2);
            document.getElementById('totalEquity').innerText = totalEquity.toFixed(2);
            document.getElementById('totalReturn').innerText = (totalReturn > 0 ? '+' : '') + totalReturn + '%';
        }

        function copyTrades(history, strategyName) {
            if (!history || history.length === 0) {
                alert('暂无交易记录');
                return;
            }
            const lines = history.map(t => {
                const timeStr = new Date(t.time * 1000).toLocaleString('zh-CN', { hour12: false });
                const sideText = t.side === 'long' ? '多' : '空';
                const pnlText = t.pnl ? ` 盈亏: ${t.pnl.toFixed(2)}` : '';
                return `${timeStr} ${t.type==='open'?'开':'平'} ${sideText} ${t.size.toFixed(4)} @ ${t.price.toFixed(2)}${pnlText}`;
            }).join('\n');
            const text = `策略: ${strategyName}\n${lines}`;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => alert('✅ 已复制到剪贴板')).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                const success = document.execCommand('copy');
                document.body.removeChild(textarea);
                alert(success ? '✅ 已复制到剪贴板' : '❌ 复制失败，请手动复制');
            }
        }

        function renderStrategies(strategies) {
            const container = document.getElementById('strategy-list');
            if (!strategies.length) {
                container.innerHTML = '<div class="card">暂无策略，点击上方创建</div>';
                return;
            }
            container.innerHTML = '';
            strategies.forEach(s => {
                const pos = s.position;
                const card = document.createElement('div');
                card.className = 'strategy-card';
                card.dataset.id = s.id;

                const directionMap = { long: '多', short: '空', both: '双向' };
                const directionText = directionMap[s.direction] || '双向';
                const shrinkText = s.shrink ? '缩量' : '';
                const modeDisplay = shrinkText ? `${directionText}+${shrinkText}` : directionText;

                const statusMap = {
                    idle: '空闲',
                    wait_long: '等待做多',
                    wait_short: '等待做空',
                    in_long: '持仓多',
                    in_short: '持仓空'
                };
                const statusText = statusMap[s.status] || '未知';

                let headerHtml = `
                    <div class="card-header">
                        <div>
                            <span style="font-weight:600;">${s.name || s.id.slice(0,8)}</span>
                            <span class="badge">${s.symbol}</span>
                            <span class="badge">${modeDisplay}</span>
                            <span class="badge ${s.active ? 'active' : ''}">${s.active ? '运行' : '停止'}</span>
                            <span class="badge">${statusText}</span>
                        </div>
                        <span class="badge ${pos ? (pos.side === 'long' ? 'long' : 'short') : ''}">${pos ? (pos.side === 'long' ? '多' : '空') : (s.status === 'wait_long' ? '等待做多' : (s.status === 'wait_short' ? '等待做空' : '空闲'))}</span>
                    </div>
                `;

                const strategyReturn = ((s.equity - 10000) / 10000 * 100).toFixed(2);
                const fundsHtml = `
                    <div style="background: #0f1420; border-radius: 16px; padding: 12px; margin: 12px 0;">
                        <div class="flex-between">
                            <div><span class="pos-label">资金总额</span><div class="pos-value">${s.equity.toFixed(2)} USDT</div></div>
                            <div><span class="pos-label">策略收益率</span><div class="pos-value ${strategyReturn >= 0 ? 'positive' : 'negative'}">${strategyReturn}%</div></div>
                        </div>
                    </div>
                `;

                let positionHtml = '';
                if (pos) {
                    positionHtml = `
                        <div class="position-grid">
                            <div class="pos-item"><div class="pos-label">收益额</div><div class="pos-value ${pos.unrealizedPnl >= 0 ? 'positive' : 'negative'}">${(pos.unrealizedPnl || 0).toFixed(2)}</div></div>
                            <div class="pos-item"><div class="pos-label">收益率</div><div class="pos-value ${pos.unrealizedPnl >= 0 ? 'positive' : 'negative'}">${((pos.unrealizedPnl / (pos.size * pos.entryPrice / pos.leverage) * 100) || 0).toFixed(2)}%</div></div>
                            <div class="pos-item"><div class="pos-label">持仓量</div><div class="pos-value">${(pos.size * pos.entryPrice).toFixed(2)}</div></div>
                            <div class="pos-item"><div class="pos-label">保证金</div><div class="pos-value">${(pos.margin || 0).toFixed(2)}</div></div>
                            <div class="pos-item"><div class="pos-label">杠杆</div><div class="pos-value">${pos.leverage}x</div></div>
                        </div>
                        <div class="price-grid">
                            <div class="pos-item"><div class="pos-label">开仓均价</div><div class="pos-value">${pos.entryPrice.toFixed(2)}</div></div>
                            <div class="pos-item"><div class="pos-label">标记价格</div><div class="pos-value">${(s.markPrice || 0).toFixed(2)}</div></div>
                            <div class="pos-item"><div class="pos-label">预估强平价</div><div class="pos-value">${(pos.entryPrice * (1 - 0.05)).toFixed(2)}</div></div>
                        </div>
                    `;
                } else {
                    let statusMsg = '';
                    if (s.status === 'wait_long') statusMsg = '等待做多';
                    else if (s.status === 'wait_short') statusMsg = '等待做空';
                    else statusMsg = '空闲';
                    positionHtml = `<div class="status-message">${statusMsg}</div>`;
                }

                const chartId = `chart-${s.id}`;
                const chartHtml = `<div id="${chartId}" class="chart-container"></div>`;

                const buttonsHtml = `
                    <div class="flex-between" style="margin-top: 12px;">
                        <button class="small ${s.active ? 'red' : 'green'}" onclick="toggleStrategy('${s.id}', ${!s.active})" style="flex:1; margin-right: 8px;">${s.active ? '停止' : '启动'}</button>
                        ${pos ? `<button class="small red" onclick="closePosition('${s.id}')" style="flex:1; margin-right: 8px;">市价全平</button>` : ''}
                        <button class="small red" onclick="deleteStrategy('${s.id}')" style="flex:1;">删除</button>
                    </div>
                `;

                let tradesHtml = `
                    <div class="pos-label" style="margin: 12px 0 4px;">所有交易记录</div>
                    <ul class="trade-list">
                `;
                if (s.history && s.history.length) {
                    s.history.slice().reverse().forEach(t => {
                        const timeStr = new Date(t.time * 1000).toLocaleString('zh-CN', { hour12: false });
                        const sign = t.pnl >= 0 ? '+' : '';
                        tradesHtml += `<li class="trade-item"><span>${timeStr} ${t.type==='open'?'开':'平'} ${t.side==='long'?'多':'空'} ${t.size.toFixed(4)} @ ${t.price.toFixed(2)}</span><span class="${t.pnl>=0?'positive':'negative'}">${sign}${(t.pnl||0).toFixed(2)}</span></li>`;
                    });
                } else {
                    tradesHtml += '<li class="trade-item" style="justify-content:center;">暂无交易</li>';
                }
                tradesHtml += `</ul>`;
                tradesHtml += `<div style="display: flex; justify-content: flex-end;"><button class="copy-btn" onclick="copyTrades(${JSON.stringify(s.history).replace(/"/g, '&quot;')}, '${(s.name || s.id.slice(0,8))}')">📋 一键复制交易记录</button></div>`;

                card.innerHTML = headerHtml + fundsHtml + positionHtml + chartHtml + buttonsHtml + tradesHtml;
                container.appendChild(card);
                loadKlines(s.id, chartId);
            });
        }

        // 独立的K线图绘制（每次创建新图表，不缓存）
        async function loadKlines(strategyId, chartId) {
            try {
                const res = await fetch(`${API_BASE}/strategy/${strategyId}?user=${USER_ID}`);
                const data = await res.json();
                if (data.klines && data.klines.length) {
                    setTimeout(() => renderChart(chartId, data.klines), 50);
                } else {
                    const container = document.getElementById(chartId);
                    if (container) container.innerHTML = '<div style="color:#8e9ab0; text-align:center; line-height:200px;">暂无K线数据</div>';
                }
            } catch (err) {
                console.error('K线加载失败', err);
                const container = document.getElementById(chartId);
                if (container) container.innerHTML = '<div style="color:#f7a8a8; text-align:center; line-height:200px;">加载失败</div>';
            }
        }

        function renderChart(containerId, klines) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.style.width = '100%';
            container.style.height = '200px';
            // 清空容器，重新创建图表
            container.innerHTML = '';

            if (typeof LightweightCharts === 'undefined') {
                container.innerHTML = '<div style="color:#f7a8a8; text-align:center; line-height:200px;">图表库加载失败</div>';
                return;
            }

            try {
                const chart = LightweightCharts.createChart(container, {
                    width: container.clientWidth,
                    height: 200,
                    layout: { backgroundColor: '#000000', textColor: '#aaa' },
                    grid: { vertLines: { color: '#2a3444' }, horzLines: { color: '#2a3444' } },
                    rightPriceScale: { borderColor: '#2a3444' },
                    timeScale: { borderColor: '#2a3444' },
                });

                const candleSeries = chart.addCandlestickSeries({
                    upColor: '#8ce99a', downColor: '#f7a8a8', borderVisible: false,
                    wickUpColor: '#8ce99a', wickDownColor: '#f7a8a8',
                });

                const closes = klines.map(k => k.close);
                const ema9 = calculateEMA(closes, 9);
                const emaData = klines.map((k, i) => ({ time: Math.floor(k.time / 1000), value: ema9[i] })).filter(d => d.value !== undefined);
                const emaSeries = chart.addLineSeries({ color: '#f0b90b', lineWidth: 2 });
                emaSeries.setData(emaData);

                const volumeSeries = chart.addHistogramSeries({
                    color: '#4caf50',
                    priceFormat: { type: 'volume' },
                    priceScaleId: 'volume',
                });
                chart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
                const volumeData = klines.map(k => ({ time: Math.floor(k.time / 1000), value: k.volume, color: k.close > k.open ? '#8ce99a' : '#f7a8a8' }));
                volumeSeries.setData(volumeData);

                candleSeries.setData(klines.map(k => ({ time: Math.floor(k.time / 1000), open: k.open, high: k.high, low: k.low, close: k.close })));

                chart.timeScale().fitContent();
                // 不缓存实例，每次重新创建
                new ResizeObserver(() => chart.resize(container.clientWidth, 200)).observe(container);
            } catch (err) {
                console.error('图表绘制错误', err);
                container.innerHTML = '<div style="color:#f7a8a8; text-align:center; line-height:200px;">图表绘制失败</div>';
            }
        }

        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            let ema = [data[0]];
            for (let i = 1; i < data.length; i++) {
                ema[i] = (data[i] - ema[i-1]) * k + ema[i-1];
            }
            return ema;
        }

        window.toggleStrategy = async (id, active) => {
            await fetch(`${API_BASE}/strategy/${id}/control?user=${USER_ID}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ active })
            });
            loadStrategies();
        };

        window.closePosition = async (id) => {
            if (!confirm('确认市价全平当前仓位？')) return;
            const res = await fetch(`${API_BASE}/strategy/${id}/close?user=${USER_ID}`, { method: 'POST' });
            if (res.ok) { alert('平仓成功'); loadStrategies(); } else alert('平仓失败');
        };

        window.deleteStrategy = async (id) => {
            if (!confirm('确认删除该策略？')) return;
            const res = await fetch(`${API_BASE}/strategy/${id}?user=${USER_ID}`, { method: 'DELETE' });
            if (res.ok) { alert('策略已删除'); loadStrategies(); } else alert('删除失败');
        };

        window.copyTrades = copyTrades;

        loadStrategies();
        setInterval(loadStrategies, 30000);
    </script>
</body>
</html>
